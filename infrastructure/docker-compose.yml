services:
  postgres:
    image: postgres:16
    container_name: pgsql-16
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: my-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  nginx:
    image: nginx:latest
    container_name: my-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf

  minio:
    image: minio/minio
    container_name: my-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  metabase:
    image: metabase/metabase
    container_name: my-metabase
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - metabasedata:/metabase.db

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: my-meilisearch
    restart: always
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=myMasterKey123!
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
    external: true
    name: orbstack-services_pgdata
  redisdata:
    external: true
    name: orbstack-services_redisdata
  miniodata:
    external: true
    name: orbstack-services_miniodata
  metabasedata:
    external: true
    name: orbstack-services_metabasedata
  meilidata:
    external: true
    name: orbstack-services_meilidata